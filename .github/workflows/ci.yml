name: ci

on: push

jobs:
  ci:
    name: Lint & Typecheck
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]
        node: [22]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Cache Nuxt artifacts
        uses: actions/cache@v4
        with:
          path: |
            .nuxt
            node_modules/.cache
          key: ${{ runner.os }}-node-${{ matrix.node }}-nuxt-${{ hashFiles('pnpm-lock.yaml', 'nuxt.config.ts', 'tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node }}-nuxt-

      - name: Cache ESLint results
        uses: actions/cache@v4
        with:
          path: .eslintcache
          key: ${{ runner.os }}-node-${{ matrix.node }}-eslint-${{ hashFiles('pnpm-lock.yaml', 'eslint.config.mjs') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node }}-eslint-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm exec eslint . --cache --cache-location .eslintcache

      - name: Typecheck
        run: pnpm run typecheck

  docker:
    name: Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: vkr:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max